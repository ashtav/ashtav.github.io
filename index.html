<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ashtav</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/1.8.4/tailwind.min.css" integrity="sha512-KO1h5ynYuqsFuEicc7DmOQc+S9m2xiCKYlC3zcZCSEw0RGDsxcMnppRaMZnb0DdzTDPaW22ID/gAGCZ9i+RT/w==" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/line-awesome/1.3.0/line-awesome/css/line-awesome.min.css" integrity="sha512-vebUliqxrVkBy3gucMhClmyQP9On/HAWQdKDXRaAlb/FKuTbxkjPKUyqVOxAcGwFDka79eTF+YXwfke1h3/wfg==" crossorigin="anonymous" />
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-gray-200">



    <!-- MENU ===== -->

    <button class="menu-toggle">
        <i class="la la-arrow-up"></i>
    </button>

    <ul class="list-menu show">
        <li class="left"> <i class="la la-file-alt"></i> </li>
        <li class="top"> <i class="la la-user"></i> </li>
        <li class="right"> <i class="la la-briefcase"></i> </li>
    </ul>

    <script>
        const doc = document

        doc.querySelector('.menu-toggle').addEventListener('click', (e) => {
            let menu = doc.querySelector('.list-menu'),
                toggleMenu = doc.querySelector('.menu-toggle')

            if(!menu.classList.contains('show')){
                menu.classList.add('show')

                toggleMenu.classList.add('push')
                toggleMenu.classList.remove('pull')

            }else{
                menu.classList.remove('show')
                
                toggleMenu.classList.remove('push')
                toggleMenu.classList.add('pull')
            }
        })

    </script>
    
</body>
</html>
